version: '3.9'

services:

  api:
    build:
      context: .
      dockerfile: src/CompraProgramadaAcoes.Api/Dockerfile
    container_name: CompraProgramadaAcoes_api
    ports:
      - "5000:8080"
    depends_on:
      - mysql
      - redis
      - kafka
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=server=mysql;port=3306;database=CompraProgramadaAcoes_db;user=root;password=123456
      - Redis__Connection=redis:6379
      - Kafka__BootstrapServers=kafka:9092

  mysql:
    image: mysql:8
    container_name: CompraProgramadaAcoes_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: CompraProgramadaAcoes_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: CompraProgramadaAcoes_redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: CompraProgramadaAcoes_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: CompraProgramadaAcoes_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  mysql_data: